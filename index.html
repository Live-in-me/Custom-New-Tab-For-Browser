<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>New Tab</title>
    <style>
        /* Reset & Base */
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            background: #111;
            color: white;
            font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
            height: 100vh;
            overflow: hidden;
        }

        /* Video Background */
        .video-bg {
            position: fixed;
            inset: 0;
            overflow: hidden;
            z-index: -1;
            background: black; 
            width: 100vw;
            height: 100vh;
        }

        .video-bg #player {
            position: absolute;
            top: 50%;
            left: 50%;
            width: calc(100vh * (16 / 9)); 
            height: 100vh;
            min-width: 100vw;
            min-height: calc(100vw * (9 / 16)); 
            transform: translate(-50%, -50%);
            pointer-events: none; 
        }


        /* Time Display */
        .time {
            position: absolute;
            left: 50%;
            top: 10vh;
            transform: translateX(-50%);
            font-size: clamp(80px, 15vw, 140px);
            font-weight: 300;
            letter-spacing: 2px;
            pointer-events: none;
            white-space: nowrap;
        }

        /* Search Box */
        .search-box {
            position: absolute;
            left: 50%;
            top: 35vh;
            transform: translate(-50%, -50%);
            width: 700px;
            padding: 14px 24px;
            font-size: 18px;
            border: 2px solid cyan;
            border-radius: 28px;
            background: rgba(17, 17, 17, 0.9);
            color: white;
            outline: none;
            text-align: center;
            backdrop-filter: blur(12px);
        }
        .search-box::placeholder { color: #aaa; }
        .search-box:focus { border-color: #0ff; box-shadow: 0 0 24px rgba(0, 255, 255, 0.3); }

        /* Shortcuts Container */
        #shortcuts {
            position: fixed;
            left: 50%;
            bottom: 16vh;
            transform: translateX(-50%);
            width: clamp(300px, 80vw, 1000px);
            height: 140px;
            pointer-events: none;
            z-index: 10;
        }

        /* Shortcut Chips */
        .chip {
            position: absolute;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 12px;
            border-radius: 16px;
            border: 1px solid rgba(0, 255, 255, 0.4);
            background: rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(12px);
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.4);
            transition: all 0.2s ease;
            pointer-events: auto;
            text-decoration: none;
            height:50px;
            width:50px;
        }
        .chip img { width: 40px; height: 40px; }
        .chip:hover {
            border-color: cyan;
            background: rgba(0, 255, 255, 0.15);
            transform: translateY(-2px);
            box-shadow: 0 12px 32px rgba(0, 255, 255, 0.2);
        }
    </style>
</head>
<body>
    <!-- Video Background - YouTube Player Container -->
    <div class="video-bg">
        <div id="player"></div>
    </div>

    <!-- Time Display -->
    <div class="time" id="timeLabel">--:--</div>

    <!-- Search Input -->
    <input type="text" class="search-box" 
           placeholder="Hello there! Ready to explore the web?" 
           id="search" 
           autocapitalize="off"
           autocomplete="off"
           spellcheck="true">

    <!-- Shortcut Chips -->
    <div id="shortcuts">
        <a class="chip" href="https://github.com" target="_blank" rel="noopener">
            <img src="Github.png" alt="GitHub" loading="lazy">
        </a>
        <a class="chip" href="https://youtube.com" target="_blank" rel="noopener">
            <img src="Youtube.png" alt="YouTube" loading="lazy">
        </a>
        <a class="chip" href="https://mail.google.com" target="_blank" rel="noopener">
            <img src="Gmail.png" alt="Gmail" loading="lazy">
        </a>
        <a class="chip" href="https://instagram.com" target="_blank" rel="noopener">
            <img src="Instagram.png" alt="Instagram" loading="lazy">
        </a>
        <a class="chip" href="https://web.whatsapp.com" target="_blank" rel="noopener">
            <img src="Whatsapp.png" alt="WhatsApp" loading="lazy">
        </a>
        <a class="chip" href="https://chatgpt.com" target="_blank" rel="noopener">
            <img src="ChatGPT.png" alt="ChatGPT" loading="lazy">
        </a>
        <a class="chip" href="https://www.perplexity.ai" target="_blank" rel="noopener">
            <img src="Perplexity.png" alt="Perplexity" loading="lazy">
        </a>
        <a class="chip" href="https://discord.com/channels/@me" target="_blank" rel="noopener">
            <img src="Discord.png" alt="Discord" loading="lazy">
        </a>
    </div>

    <script>
        // === TIME DISPLAY ===
        function updateTime() {
            const now = new Date();
            const timeString = now.toLocaleTimeString('en-US', {
                hour: '2-digit',
                minute: '2-digit',
                hour12: false
            });
            document.getElementById('timeLabel').textContent = timeString;
        }
        setInterval(updateTime, 1000);
        updateTime();

        // === SEARCH FUNCTIONALITY ===
        const searchInput = document.getElementById('search');
        searchInput.addEventListener('keydown', (e) => {
            if (e.key !== 'Enter') return;
            const query = searchInput.value.trim();
            if (!query) return;

            const url = query.includes('.') && !query.includes(' ')
                ? (query.startsWith('http') ? query : 'https://' + query)
                : `https://www.google.com/search?q=${encodeURIComponent(query)}`;
            
            window.location.href = url;
        });

        // === YOUTUBE IFRAME API + SPEED CONTROL ===
        let player;
        const BASE_SPEED = 1.0;
        const BOOST_SPEED = 1.8;
        let speedTimer;

        // Load YouTube IFrame API
        var tag = document.createElement('script');
        tag.src = "https://www.youtube.com/iframe_api";
        var firstScriptTag = document.getElementsByTagName('script')[0];
        firstScriptTag.parentNode.insertBefore(tag, firstScriptTag);

        // Create player when API is ready
        function onYouTubeIframeAPIReady() {
            player = new YT.Player('player', {
                height: '100%',
                width: '100%',
                videoId: '9vntypeV5QU', 
                playerVars: {
                    'autoplay': 1,
                    'mute': 1,
                    'loop': 1,
                    'playlist': '9vntypeV5QU',
                    'controls': 0,
                    'rel': 0,
                    'modestbranding': 1,
                    'playsinline': 1,
                    'enablejsapi': 1,
                    'disablekb': 1
                },
                events: {
                    'onReady': onPlayerReady
                }
            });
        }

        function onPlayerReady(event) {
            console.log('YouTube player ready');
        }

        function setPlaybackRate(rate) {
            if (player && player.setPlaybackRate) {
                player.setPlaybackRate(rate);
            }
        }

        // Typing speed control
        searchInput.addEventListener('input', () => {
            setPlaybackRate(BOOST_SPEED);
            clearTimeout(speedTimer);
            speedTimer = setTimeout(() => setPlaybackRate(BASE_SPEED), 800);
        });

        // === ANIMATED CHIPS PHYSICS ===
        (function initChips() {
            const container = document.getElementById('shortcuts');
            const chips = Array.from(container.querySelectorAll('.chip'));
            
            if (!chips.length) return;

            // Container setup
            Object.assign(container.style, {
                width: 'clamp(300px, 80vw, 1000px)',
                height: '140px'
            });

            // Chip physics state
            const state = chips.map((chip, i) => {
                const rect = chip.getBoundingClientRect();
                return {
                    el: chip,
                    x: (i + 1) * (container.clientWidth / (chips.length + 1)),
                    y: container.clientHeight * 0.5,
                    vx: (Math.random() - 0.5) * 2,
                    vy: (Math.random() - 0.5) * 1,
                    r: Math.max(rect.width, rect.height) * 0.5,
                    wobble: Math.random() * Math.PI * 2
                };
            });

            const config = {
                margin: 12,
                damping: 0.96,
                noise: 0.02,
                snapBack: 0.003,
                maxSpeed: 4,
                typeKick: { vx: 1.8, vy: 1.0 }
            };

            function clamp(val, min, max) {
                return Math.max(min, Math.min(max, val));
            }

            function updateChipPositions() {
                state.forEach(s => {
                    // Wobble effect
                    s.wobble += 0.03;
                    const wobbleX = Math.sin(s.wobble) * 4;
                    const wobbleY = Math.cos(s.wobble * 1.1) * 2;

                    // Physics forces
                    s.vx += (Math.random() - 0.5) * config.noise;
                    s.vy += (Math.random() - 0.5) * config.noise + 
                           (container.clientHeight * 0.5 - s.y) * config.snapBack;

                    s.vx = clamp(s.vx, -config.maxSpeed, config.maxSpeed);
                    s.vy = clamp(s.vy, -config.maxSpeed, config.maxSpeed);

                    s.x += s.vx + wobbleX * 0.03;
                    s.y += s.vy + wobbleY * 0.03;

                    // Wall collision
                    const left = config.margin + s.r;
                    const right = container.clientWidth - config.margin - s.r;
                    const top = config.margin + s.r;
                    const bottom = container.clientHeight - config.margin - s.r;

                    if (s.x < left) { s.x = left; s.vx *= -1; }
                    if (s.x > right) { s.x = right; s.vx *= -1; }
                    if (s.y < top) { s.y = top; s.vy *= -1; }
                    if (s.y > bottom) { s.y = bottom; s.vy *= -1; }

                    s.vx *= config.damping;
                    s.vy *= config.damping;
                });

                // Chip-to-chip collisions (simplified)
                for (let i = 0; i < state.length; i++) {
                    for (let j = i + 1; j < state.length; j++) {
                        const a = state[i], b = state[j];
                        const dx = b.x - a.x;
                        const dy = b.y - a.y;
                        const dist = Math.hypot(dx, dy);
                        const minDist = a.r + b.r;

                        if (dist < minDist && dist > 0) {
                            const overlap = (minDist - dist) * 0.5;
                            const nx = dx / dist;
                            const ny = dy / dist;
                            
                            a.x -= nx * overlap;
                            a.y -= ny * overlap;
                            b.x += nx * overlap;
                            b.y += ny * overlap;
                        }
                    }
                }

                // Render
                state.forEach(s => {
                    s.el.style.transform = `translate3d(${s.x - s.r}px, ${s.y - s.r}px, 0)`;
                });

                requestAnimationFrame(updateChipPositions);
            }

            // Typing impulse effect
            function applyImpulse(strength = 1) {
                const baseAngle = Math.random() * Math.PI * 2;
                state.forEach((s, i) => {
                    const angle = baseAngle + i * 0.6;
                    s.vx += Math.cos(angle) * config.typeKick.vx * strength;
                    s.vy += Math.sin(angle) * config.typeKick.vy * strength;
                });
            }

            // Event listeners
            searchInput.addEventListener('input', () => applyImpulse(1));
            searchInput.addEventListener('keydown', (e) => {
                if (/[a-z0-9]/.test(e.key) || e.key === 'Backspace') {
                    applyImpulse(0.6);
                }
            });

            // Start animation
            requestAnimationFrame(updateChipPositions);
        })();
    </script>
</body>
</html>
